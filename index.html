<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter - Nave Espacial</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: #000;
            color: #fff;
            font-family: 'Courier New', monospace;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            flex-direction: column;
        }
        canvas {
            image-rendering: pixelated;
            border: 4px solid #0ff;
            box-shadow: 0 0 30px #0ff;
        }
        #hud {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 20px;
            text-shadow: 0 0 10px #0ff;
            pointer-events: none;
        }
        #game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 60px;
            color: #f00;
            text-shadow: 0 0 20px #f00;
            display: none;
            text-align: center;
        }
        #instructions {
            position: absolute;
            bottom: 20px;
            font-size: 18px;
            text-align: center;
            width: 100%;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            font-size: 18px;
            background: #0ff;
            color: #000;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <canvas id="game" width="800" height="600"></canvas>
    
    <div id="hud">
        <div>Puntuación: <span id="score">0</span></div>
        <div>Nivel: <span id="level">1</span></div>
        <div>Vidas: <span id="lives">3</span></div>
    </div>

    <div id="game-over">
        GAME OVER<br>
        <span style="font-size: 30px;">Presiona R para reiniciar</span>
    </div>

    <div id="instructions">
        ← → (o A/D) : Mover • ESPACIO : Disparar • W/S : Mover arriba/abajo<br>
        ¡Destruye enemigos y jefes! Cada 3 niveles aparece un jefe final.
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        
        const WIDTH = 800;
        const HEIGHT = 600;
        const FPS = 60;

        let score = 0;
        let lives = 3;
        let level = 1;
        let gameOver = false;
        let lastTime = 0;

        // Jugador
        let player = {
            x: WIDTH / 2 - 25,
            y: HEIGHT - 80,
            width: 50,
            height: 40,
            speed: 8,
            lastShot: 0,
            shotDelay: 180
        };

        // Grupos
        let bullets = [];
        let enemyBullets = [];
        let enemies = [];
        let boss = null;

        // Estrellas de fondo
        let stars = [];
        for (let i = 0; i < 120; i++) {
            stars.push({
                x: Math.random() * WIDTH,
                y: Math.random() * HEIGHT,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 3 + 2
            });
        }

        // Teclas
        let keys = {};

        window.addEventListener('keydown', e => {
            keys[e.key.toLowerCase()] = true;
            if (gameOver && e.key.toLowerCase() === 'r') resetGame();
        });
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // Crear enemigo normal
        function createEnemy() {
            return {
                x: Math.random() * (WIDTH - 40),
                y: -50 - Math.random() * 100,
                width: 40,
                height: 30,
                speed: 3 + level * 0.6,
                type: 'enemy',
                lastShot: Date.now() - Math.random() * 800,
                shotDelay: Math.max(600, 1100 - level * 80)
            };
        }

        // Crear jefe
        function createBoss() {
            return {
                x: WIDTH / 2 - 50,
                y: -80,
                width: 100,
                height: 80,
                speedX: 3.5 + level * 0.4,
                speedY: 1.5,
                health: 12 + level * 7,
                type: 'boss',
                lastShot: Date.now(),
                shotDelay: 380
            };
        }

        // Crear bala del jugador
        function shoot() {
            const now = Date.now();
            if (now - player.lastShot > player.shotDelay) {
                player.lastShot = now;
                bullets.push({
                    x: player.x + player.width / 2 - 3,
                    y: player.y,
                    width: 6,
                    height: 20,
                    speed: -14
                });
            }
        }

        // Crear bala enemiga
        function enemyShoot(enemy) {
            const now = Date.now();
            if (now - enemy.lastShot > enemy.shotDelay) {
                enemy.lastShot = now;
                if (enemy.type === 'boss') {
                    // Jefe dispara 3 balas en abanico
                    for (let i = -1; i <= 1; i++) {
                        enemyBullets.push({
                            x: enemy.x + enemy.width / 2,
                            y: enemy.y + enemy.height,
                            width: 10,
                            height: 22,
                            speed: 7,
                            dx: i * 2.2
                        });
                    }
                } else {
                    enemyBullets.push({
                        x: enemy.x + enemy.width / 2 - 4,
                        y: enemy.y + enemy.height,
                        width: 8,
                        height: 18,
                        speed: 6,
                        dx: 0
                    });
                }
            }
        }

        // Spawnear oleada según nivel
        function spawnWave() {
            enemies = [];
            boss = null;

            const numEnemies = 5 + level * 3;
            for (let i = 0; i < numEnemies; i++) {
                enemies.push(createEnemy());
            }

            // Jefe cada 3 niveles (al final del nivel)
            if (level % 3 === 0) {
                setTimeout(() => {
                    if (!gameOver) {
                        boss = createBoss();
                        // Removemos un par de enemigos para que el jefe sea el foco
                        enemies.splice(0, 3);
                    }
                }, 1800);
            }
        }

        // Reiniciar juego completo
        function resetGame() {
            score = 0;
            lives = 3;
            level = 1;
            gameOver = false;
            bullets = [];
            enemyBullets = [];
            enemies = [];
            boss = null;
            player.x = WIDTH / 2 - 25;
            player.y = HEIGHT - 80;
            document.getElementById('game-over').style.display = 'none';
            spawnWave();
        }

        // Colisiones
        function checkCollisions() {
            // Balas jugador vs enemigos
            for (let i = bullets.length - 1; i >= 0; i--) {
                const b = bullets[i];
                
                // Contra enemigos normales
                for (let j = enemies.length - 1; j >= 0; j--) {
                    const e = enemies[j];
                    if (b.x < e.x + e.width && b.x + b.width > e.x &&
                        b.y < e.y + e.height && b.y + b.height > e.y) {
                        bullets.splice(i, 1);
                        enemies.splice(j, 1);
                        score += 15;
                        break;
                    }
                }
                
                // Contra jefe
                if (boss && b.x < boss.x + boss.width && b.x + b.width > boss.x &&
                    b.y < boss.y + boss.height && b.y + b.height > boss.y) {
                    bullets.splice(i, 1);
                    boss.health -= 1;
                    score += 25;
                    if (boss.health <= 0) {
                        boss = null;
                        score += 300 * level;
                    }
                }
            }

            // Balas enemigas vs jugador
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                if (eb.x < player.x + player.width && eb.x + eb.width > player.x &&
                    eb.y < player.y + player.height && eb.y + eb.height > player.y) {
                    enemyBullets.splice(i, 1);
                    lives--;
                    if (lives <= 0) {
                        gameOver = true;
                        document.getElementById('game-over').style.display = 'block';
                    }
                }
            }

            // Enemigos chocan con jugador
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                if (e.x < player.x + player.width && e.x + e.width > player.x &&
                    e.y < player.y + player.height && e.y + e.height > player.y) {
                    lives--;
                    enemies.splice(i, 1);
                    if (lives <= 0) {
                        gameOver = true;
                        document.getElementById('game-over').style.display = 'block';
                    }
                }
            }

            // Jefe choca con jugador
            if (boss && boss.x < player.x + player.width && boss.x + boss.width > player.x &&
                boss.y < player.y + player.height && boss.y + boss.height > player.y) {
                lives -= 2;
                boss = null;
                if (lives <= 0) {
                    gameOver = true;
                    document.getElementById('game-over').style.display = 'block';
                }
            }
        }

        // Actualizar juego
        function update() {
            if (gameOver) return;

            // Movimiento jugador
            if ((keys['arrowleft'] || keys['a']) && player.x > 0) player.x -= player.speed;
            if ((keys['arrowright'] || keys['d']) && player.x < WIDTH - player.width) player.x += player.speed;
            if ((keys['arrowup'] || keys['w']) && player.y > 50) player.y -= player.speed;
            if ((keys['arrowdown'] || keys['s']) && player.y < HEIGHT - player.height - 10) player.y += player.speed;

            // Disparo
            if (keys[' '] ) shoot();

            // Actualizar balas jugador
            for (let i = bullets.length - 1; i >= 0; i--) {
                bullets[i].y += bullets[i].speed;
                if (bullets[i].y < -20) bullets.splice(i, 1);
            }

            // Actualizar balas enemigas
            for (let i = enemyBullets.length - 1; i >= 0; i--) {
                const eb = enemyBullets[i];
                eb.y += eb.speed;
                if (eb.dx) eb.x += eb.dx;
                if (eb.y > HEIGHT + 20) enemyBullets.splice(i, 1);
            }

            // Actualizar enemigos normales
            for (let i = enemies.length - 1; i >= 0; i--) {
                const e = enemies[i];
                e.y += e.speed;
                
                // Disparo enemigo
                enemyShoot(e);
                
                // Si se sale de pantalla
                if (e.y > HEIGHT + 50) enemies.splice(i, 1);
            }

            // Actualizar jefe
            if (boss) {
                boss.x += boss.speedX;
                if (boss.x <= 20 || boss.x >= WIDTH - boss.width - 20) boss.speedX *= -1;
                
                if (boss.y < 80) boss.y += boss.speedY;
                
                enemyShoot(boss);
            }

            // Avanzar de nivel cuando no queden enemigos ni jefe
            if (enemies.length === 0 && !boss) {
                level++;
                spawnWave();
            }

            checkCollisions();

            // Actualizar HUD
            document.getElementById('score').textContent = score;
            document.getElementById('level').textContent = level;
            document.getElementById('lives').textContent = lives;
        }

        // Dibujar todo
        function draw() {
            ctx.fillStyle = '#000011';
            ctx.fillRect(0, 0, WIDTH, HEIGHT);

            // Estrellas
            ctx.fillStyle = '#ffffff';
            for (let star of stars) {
                ctx.globalAlpha = Math.random() * 0.4 + 0.6;
                ctx.fillRect(star.x, star.y, star.size, star.size);
                star.y += star.speed;
                if (star.y > HEIGHT) {
                    star.y = 0;
                    star.x = Math.random() * WIDTH;
                }
            }
            ctx.globalAlpha = 1;

            // Dibujar jugador (nave triangular)
            ctx.fillStyle = '#00ffff';
            ctx.strokeStyle = '#00ffff';
            ctx.lineWidth = 3;
            ctx.beginPath();
            ctx.moveTo(player.x + player.width / 2, player.y);
            ctx.lineTo(player.x, player.y + player.height);
            ctx.lineTo(player.x + player.width, player.y + player.height);
            ctx.closePath();
            ctx.fill();
            ctx.stroke();

            // Dibujar balas jugador (láser verde)
            ctx.fillStyle = '#0f0';
            for (let b of bullets) {
                ctx.fillRect(b.x, b.y, b.width, b.height);
            }

            // Dibujar balas enemigas
            ctx.fillStyle = '#ff3300';
            for (let eb of enemyBullets) {
                ctx.fillRect(eb.x, eb.y, eb.width, eb.height);
            }

            // Dibujar enemigos normales (naves rojas)
            ctx.fillStyle = '#ff0000';
            ctx.strokeStyle = '#ff8800';
            for (let e of enemies) {
                ctx.save();
                ctx.translate(e.x + e.width / 2, e.y + e.height / 2);
                ctx.beginPath();
                ctx.moveTo(0, -15);
                ctx.lineTo(-20, 15);
                ctx.lineTo(20, 15);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                ctx.restore();
            }

            // Dibujar jefe (nave grande naranja)
            if (boss) {
                ctx.fillStyle = '#ff9900';
                ctx.strokeStyle = '#ffff00';
                ctx.lineWidth = 6;
                ctx.save();
                ctx.translate(boss.x + boss.width / 2, boss.y + boss.height / 2);
                ctx.beginPath();
                ctx.moveTo(0, -35);
                ctx.lineTo(-50, 35);
                ctx.lineTo(50, 35);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
                
                // Detalle de jefe
                ctx.fillStyle = '#ffff00';
                ctx.fillRect(-15, -10, 30, 15);
                ctx.restore();
                
                // Barra de vida del jefe
                const healthPercent = boss.health / (12 + level * 7);
                ctx.fillStyle = '#00ff00';
                ctx.fillRect(boss.x, boss.y - 20, boss.width * healthPercent, 8);
                ctx.strokeStyle = '#ffffff';
                ctx.lineWidth = 2;
                ctx.strokeRect(boss.x, boss.y - 20, boss.width, 8);
            }
        }

        // Bucle principal del juego
        function gameLoop(timestamp) {
            if (!lastTime) lastTime = timestamp;
            if (timestamp - lastTime > 1000 / FPS) {
                update();
                draw();
                lastTime = timestamp;
            }
            requestAnimationFrame(gameLoop);
        }

        // Iniciar juego
        function startGame() {
            spawnWave();
            requestAnimationFrame(gameLoop);
        }

        // Botón de reinicio (opcional)
        window.resetGame = resetGame;

        // Iniciar automáticamente
        startGame();
    </script>
</body>
</html>
