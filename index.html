<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Juego de Aventura Espacial - Por Grok</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #000;
            font-family: Arial, sans-serif;
            color: #fff;
        }
        #game-container {
            position: relative;
            width: 800px;
            height: 600px;
            background-color: #111;
            border: 2px solid #fff;
            overflow: hidden;
        }
        #canvas {
            width: 100%;
            height: 100%;
        }
        #start-screen, #game-over-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.8);
            z-index: 10;
        }
        #start-screen button, #game-over-screen button {
            padding: 10px 20px;
            font-size: 20px;
            background-color: #4CAF50;
            border: none;
            color: white;
            cursor: pointer;
            margin-top: 20px;
        }
        #start-screen button:hover, #game-over-screen button:hover {
            background-color: #45a049;
        }
        #score {
            position: absolute;
            top: 10px;
            left: 10px;
            font-size: 24px;
            z-index: 5;
        }
        #lives {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            z-index: 5;
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <canvas id="canvas"></canvas>
        <div id="start-screen">
            <h1>Aventura Espacial</h1>
            <p>Controla tu nave con las flechas o WASD. Evita asteroides y recoge estrellas para puntos. ¡Sobrevive lo más que puedas!</p>
            <button id="start-button">Iniciar Juego</button>
        </div>
        <div id="game-over-screen" class="hidden">
            <h1>¡Juego Terminado!</h1>
            <p id="final-score"></p>
            <button id="restart-button">Reiniciar</button>
        </div>
        <div id="score">Puntos: 0</div>
        <div id="lives">Vidas: 3</div>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = 800;
        canvas.height = 600;

        const startScreen = document.getElementById('start-screen');
        const gameOverScreen = document.getElementById('game-over-screen');
        const startButton = document.getElementById('start-button');
        const restartButton = document.getElementById('restart-button');
        const scoreDisplay = document.getElementById('score');
        const livesDisplay = document.getElementById('lives');
        const finalScore = document.getElementById('final-score');

        let player, asteroids, stars, score, lives, gameRunning;

        class Player {
            constructor() {
                this.x = canvas.width / 2;
                this.y = canvas.height / 2;
                this.size = 20;
                this.speed = 5;
                this.color = '#00FF00';
            }

            draw() {
                ctx.beginPath();
                ctx.moveTo(this.x, this.y - this.size);
                ctx.lineTo(this.x - this.size, this.y + this.size);
                ctx.lineTo(this.x + this.size, this.y + this.size);
                ctx.closePath();
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            move(dx, dy) {
                this.x += dx * this.speed;
                this.y += dy * this.speed;
                this.x = Math.max(this.size, Math.min(canvas.width - this.size, this.x));
                this.y = Math.max(this.size, Math.min(canvas.height - this.size, this.y));
            }
        }

        class Asteroid {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -20;
                this.size = Math.random() * 30 + 20;
                this.speed = Math.random() * 3 + 1;
                this.color = '#808080';
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.y += this.speed;
                if (this.y > canvas.height + this.size) {
                    return true; // Out of bounds
                }
                return false;
            }
        }

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = -10;
                this.size = 5;
                this.speed = 2;
                this.color = '#FFFF00';
            }

            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
            }

            update() {
                this.y += this.speed;
                if (this.y > canvas.height + this.size) {
                    return true; // Out of bounds
                }
                return false;
            }
        }

        function initGame() {
            player = new Player();
            asteroids = [];
            stars = [];
            score = 0;
            lives = 3;
            gameRunning = true;
            scoreDisplay.textContent = `Puntos: ${score}`;
            livesDisplay.textContent = `Vidas: ${lives}`;
            gameOverScreen.classList.add('hidden');
            spawnAsteroids();
            spawnStars();
            gameLoop();
        }

        function spawnAsteroids() {
            setInterval(() => {
                if (gameRunning) {
                    asteroids.push(new Asteroid());
                }
            }, 1000);
        }

        function spawnStars() {
            setInterval(() => {
                if (gameRunning) {
                    stars.push(new Star());
                }
            }, 2000);
        }

        function detectCollision(obj1, obj2) {
            const dx = obj1.x - obj2.x;
            const dy = obj1.y - obj2.y;
            const distance = Math.sqrt(dx * dx + dy * dy);
            return distance < obj1.size + obj2.size;
        }

        function updateGame() {
            asteroids = asteroids.filter(asteroid => {
                if (asteroid.update()) return false;
                if (detectCollision(player, asteroid)) {
                    lives--;
                    livesDisplay.textContent = `Vidas: ${lives}`;
                    if (lives <= 0) {
                        endGame();
                    }
                    return false;
                }
                return true;
            });

            stars = stars.filter(star => {
                if (star.update()) return false;
                if (detectCollision(player, star)) {
                    score += 10;
                    scoreDisplay.textContent = `Puntos: ${score}`;
                    return false;
                }
                return true;
            });
        }

        function drawBackground() {
            ctx.fillStyle = '#000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Estrellas de fondo
            ctx.fillStyle = '#FFF';
            for (let i = 0; i < 100; i++) {
                const x = Math.random() * canvas.width;
                const y = Math.random() * canvas.height;
                ctx.fillRect(x, y, 1, 1);
            }
        }

        function gameLoop() {
            if (!gameRunning) return;

            drawBackground();
            player.draw();
            asteroids.forEach(asteroid => asteroid.draw());
            stars.forEach(star => star.draw());

            updateGame();

            requestAnimationFrame(gameLoop);
        }

        function endGame() {
            gameRunning = false;
            finalScore.textContent = `Puntos finales: ${score}`;
            gameOverScreen.classList.remove('hidden');
        }

        const keys = {};
        window.addEventListener('keydown', e => keys[e.key] = true);
        window.addEventListener('keyup', e => keys[e.key] = false);

        function handleInput() {
            let dx = 0, dy = 0;
            if (keys['ArrowUp'] || keys['w'] || keys['W']) dy -= 1;
            if (keys['ArrowDown'] || keys['s'] || keys['S']) dy += 1;
            if (keys['ArrowLeft'] || keys['a'] || keys['A']) dx -= 1;
            if (keys['ArrowRight'] || keys['d'] || keys['D']) dx += 1;

            if (dx !== 0 || dy !== 0) {
                const length = Math.sqrt(dx * dx + dy * dy);
                dx /= length;
                dy /= length;
                player.move(dx, dy);
            }
        }

        setInterval(handleInput, 16); // ~60 FPS

        startButton.addEventListener('click', () => {
            startScreen.classList.add('hidden');
            initGame();
        });

        restartButton.addEventListener('click', () => {
            initGame();
        });
    </script>
</body>
</html>
