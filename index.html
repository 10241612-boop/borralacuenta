<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neon Snake</title>
    <style>
        /* Estilos generales y fondo oscuro */
        body {
            background-color: #121212;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        
        /* Título con efecto neón */
        h1 {
            margin: 10px 0;
            text-shadow: 0 0 15px #00ffcc;
            color: #00ffcc;
            letter-spacing: 2px;
        }
        
        #score-board {
            font-size: 24px;
            margin-bottom: 20px;
            color: #aaa;
        }
        #score {
            color: #fff;
            font-weight: bold;
        }
        
        /* El lienzo del juego */
        canvas {
            background-color: #1e1e1e;
            border: 2px solid #333;
            box-shadow: 0 0 30px rgba(0, 255, 204, 0.15);
            border-radius: 8px;
        }
        
        /* Pantalla flotante de Fin del Juego */
        #game-over {
            display: none;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(15, 15, 15, 0.95);
            padding: 40px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #ff3366;
            box-shadow: 0 0 30px rgba(255, 51, 102, 0.5);
            backdrop-filter: blur(5px);
        }
        
        #game-over h2 {
            color: #ff3366;
            text-shadow: 0 0 15px #ff3366;
            margin-top: 0;
        }
        
        /* Botón de reinicio estilizado */
        button {
            background-color: #00ffcc;
            color: #121212;
            border: none;
            padding: 12px 25px;
            font-size: 18px;
            cursor: pointer;
            border-radius: 8px;
            font-weight: bold;
            margin-top: 20px;
            transition: all 0.3s ease;
            text-transform: uppercase;
        }
        
        button:hover {
            background-color: #00ccaa;
            transform: scale(1.05);
            box-shadow: 0 0 15px #00ffcc;
        }
    </style>
</head>
<body>

    <h1>NEON SNAKE</h1>
    <div id="score-board">Puntuación: <span id="score">0</span></div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <div id="game-over">
        <h2>¡Juego Terminado!</h2>
        <p style="font-size: 20px;">Tu puntuación fue: <span id="final-score" style="font-weight: bold; color: #fff;">0</span></p>
        <button onclick="resetGame()">Jugar de Nuevo</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const gameOverScreen = document.getElementById('game-over');
        const finalScoreElement = document.getElementById('final-score');

        // Configuración de la cuadrícula
        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        // Variables del juego
        let snake = [{x: 10, y: 10}];
        let dx = 0;
        let dy = 0;
        let foodX = 15;
        let foodY = 15;
        let score = 0;
        let gameLoop;
        let isGameOver = false;

        // Bucle principal del juego
        function drawGame() {
            if(isGameOver) return;

            changeSnakePosition();
            if (hasGameEnded()) {
                showGameOver();
                return;
            }

            clearScreen();
            checkFoodCollision();
            drawFood();
            drawSnake();

            // Controla la velocidad del juego (100ms)
            gameLoop = setTimeout(drawGame, 100);
        }

        // Limpiar el lienzo en cada frame
        function clearScreen() {
            ctx.fillStyle = '#1e1e1e';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        // Dibujar la serpiente con efecto neón
        function drawSnake() {
            snake.forEach((part, index) => {
                // La cabeza es más brillante que el cuerpo
                ctx.fillStyle = index === 0 ? '#00ffcc' : '#00b38f';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#00ffcc';
                ctx.fillRect(part.x * gridSize, part.y * gridSize, gridSize - 2, gridSize - 2);
                ctx.shadowBlur = 0; // resetear sombra
            });
        }

        // Mover la serpiente
        function changeSnakePosition() {
            // No moverse si no se ha presionado ninguna tecla aún
            if (dx === 0 && dy === 0) return;

            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            snake.unshift(head); // Agregar nueva cabeza
            snake.pop(); // Quitar la cola
        }

        // Dibujar la comida (manzana) con brillo rojo
        function drawFood() {
            ctx.fillStyle = '#ff3366';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#ff3366';
            ctx.fillRect(foodX * gridSize, foodY * gridSize, gridSize - 2, gridSize - 2);
            ctx.shadowBlur = 0;
        }

        // Detectar si comemos la manzana
        function checkFoodCollision() {
            if (snake[0].x === foodX && snake[0].y === foodY) {
                score += 10;
                scoreElement.innerText = score;
                // Hacer crecer la serpiente duplicando su última parte
                snake.push({...snake[snake.length - 1]});
                placeFood();
            }
        }

        // Colocar la comida en un lugar aleatorio
        function placeFood() {
            foodX = Math.floor(Math.random() * tileCount);
            foodY = Math.floor(Math.random() * tileCount);
            
            // Asegurar que la comida no aparezca sobre el cuerpo de la serpiente
            snake.forEach(part => {
                if (part.x === foodX && part.y === foodY) {
                    placeFood();
                }
            });
        }

        // Comprobar si chocamos
        function hasGameEnded() {
            // Chocar con las paredes
            if (snake[0].x < 0 || snake[0].x >= tileCount || snake[0].y < 0 || snake[0].y >= tileCount) {
                return true;
            }
            // Chocar consigo misma (empezamos el loop desde 1 para ignorar la cabeza)
            for (let i = 1; i < snake.length; i++) {
                if (snake[0].x === snake[i].x && snake[0].y === snake[i].y) {
                    return true;
                }
            }
            return false;
        }

        function showGameOver() {
            isGameOver = true;
            gameOverScreen.style.display = 'block';
            finalScoreElement.innerText = score;
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            dx = 0;
            dy = 0;
            score = 0;
            scoreElement.innerText = score;
            isGameOver = false;
            gameOverScreen.style.display = 'none';
            placeFood();
            clearTimeout(gameLoop);
            drawGame();
        }

        // Controles de teclado
        document.body.addEventListener('keydown', (event) => {
            // Evitar que la página haga scroll cuando usamos las flechas
            if(["ArrowUp","ArrowDown","ArrowLeft","ArrowRight"," "].indexOf(event.code) > -1) {
                event.preventDefault();
            }

            // Cambiar dirección, evitando que la serpiente se regrese sobre sí misma
            if (event.key === 'ArrowUp' && dy === 0) {
                dx = 0;
                dy = -1;
            }
            if (event.key === 'ArrowDown' && dy === 0) {
                dx = 0;
                dy = 1;
            }
            if (event.key === 'ArrowLeft' && dx === 0) {
                dx = -1;
                dy = 0;
            }
            if (event.key === 'ArrowRight' && dx === 0) {
                dx = 1;
                dy = 0;
            }
        });

        // Iniciar el juego la primera vez
        placeFood();
        drawGame();
    </script>
</body>
</html>
