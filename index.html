<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter: Starfox Vibe</title>
    <style>
        body { margin: 0; background-color: #050510; color: white; font-family: 'Courier New', Courier, monospace; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        canvas { box-shadow: 0 0 30px rgba(0, 150, 255, 0.4); border: 2px solid #225; background: radial-gradient(circle at center, #112 0%, #000 100%); }
        #ui-layer { position: absolute; width: 600px; height: 800px; pointer-events: none; display: flex; flex-direction: column; justify-content: space-between; padding: 20px; box-sizing: border-box; }
        .hud-text { font-size: 20px; font-weight: bold; text-shadow: 2px 2px 0 #000; color: #0cf; }
        
        #menu { position: absolute; width: 600px; height: 800px; background: rgba(0,0,0,0.85); display: flex; flex-direction: column; justify-content: center; align-items: center; pointer-events: auto; }
        h1 { font-size: 40px; color: #fff; text-transform: uppercase; letter-spacing: 5px; text-shadow: 0 0 10px #0cf; text-align: center;}
        button { background: transparent; border: 2px solid #0cf; color: #0cf; padding: 15px 40px; margin: 10px; font-size: 24px; cursor: pointer; font-family: inherit; transition: 0.3s; text-transform: uppercase; }
        button:hover { background: #0cf; color: #000; box-shadow: 0 0 20px #0cf; }
    </style>
</head>
<body>

    <div style="position: relative;">
        <canvas id="gameCanvas" width="600" height="800"></canvas>
        
        <div id="ui-layer" style="display: none;">
            <div style="display: flex; justify-content: space-between;">
                <span class="hud-text" id="scoreDisplay">Puntos: 0</span>
                <span class="hud-text" id="levelDisplay">Nivel: 1</span>
            </div>
            <div style="text-align: center;">
                <span class="hud-text" id="bossWarning" style="color: red; font-size: 30px; display: none;">¡PELIGRO: JEFE APROXIMÁNDOSE!</span>
            </div>
            <div style="display: flex; justify-content: space-between;">
                <span class="hud-text" id="hpDisplay">HP: 3</span>
                <span class="hud-text" id="modeDisplay">Modo</span>
            </div>
        </div>

        <div id="menu">
            <h1>Starflight<br>Assault</h1>
            <p>Controles: WASD / Flechas | Espacio: Disparar</p>
            <button onclick="startGame('story')">Modo Historia</button>
            <button onclick="startGame('loop')">Modo Loop</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const menu = document.getElementById("menu");
    const uiLayer = document.getElementById("ui-layer");
    
    // UI Elements
    const scoreDisplay = document.getElementById("scoreDisplay");
    const levelDisplay = document.getElementById("levelDisplay");
    const hpDisplay = document.getElementById("hpDisplay");
    const modeDisplay = document.getElementById("modeDisplay");
    const bossWarning = document.getElementById("bossWarning");

    // Variables
    let gameLoop, score, level, enemiesDefeated, hp, gameMode, bossActive;
    let bullets = [], enemies = [], stars = [];
    let keys = {};

    // Controles (Soporta WASD y Flechas)
    document.addEventListener("keydown", (e) => { keys[e.key.toLowerCase()] = true; if(e.code === "Space") e.preventDefault(); });
    document.addEventListener("keyup", (e) => { keys[e.key.toLowerCase()] = false; });

    // --- EFECTO PSEUDO-3D DE ESTRELLAS ---
    class Star {
        constructor() {
            this.reset();
            this.z = Math.random() * canvas.width; // Empezar repartidas
        }
        reset() {
            this.x = (Math.random() - 0.5) * canvas.width * 2;
            this.y = (Math.random() - 0.5) * canvas.height * 2;
            this.z = canvas.width;
        }
        update() {
            this.z -= 5 + (level * 0.5); // Más rápido al subir de nivel
            if (this.z <= 0) this.reset();
        }
        draw() {
            let px = (this.x / this.z) * 300 + canvas.width / 2;
            let py = (this.y / this.z) * 300 + canvas.height / 2;
            let radius = Math.max(0.5, (canvas.width - this.z) / 200);

            if (px >= 0 && px <= canvas.width && py >= 0 && py <= canvas.height) {
                ctx.fillStyle = "rgba(255, 255, 255, " + (1 - this.z / canvas.width) + ")";
                ctx.beginPath();
                ctx.arc(px, py, radius, 0, Math.PI * 2);
                ctx.fill();
            }
        }
    }
    for(let i=0; i<200; i++) stars.push(new Star());

    // --- CLASES DEL JUEGO ---
    class Player {
        constructor() {
            this.width = 50; this.height = 40;
            this.x = canvas.width / 2 - this.width / 2;
            this.y = canvas.height - 80;
            this.speed = 7;
            this.cooldown = 0;
            this.tilt = 0; // Para animación de giro
        }
        draw() {
            ctx.save();
            ctx.translate(this.x + this.width/2, this.y + this.height/2);
            ctx.rotate(this.tilt * Math.PI / 180);

            // Dibujar nave tipo Arwing (geometría)
            ctx.fillStyle = "#ddd";
            ctx.beginPath(); ctx.moveTo(0, -this.height/2); ctx.lineTo(this.width/2, this.height/2); ctx.lineTo(-this.width/2, this.height/2); ctx.closePath(); ctx.fill();
            // Cabina
            ctx.fillStyle = "#0cf";
            ctx.beginPath(); ctx.moveTo(0, -10); ctx.lineTo(8, 10); ctx.lineTo(-8, 10); ctx.closePath(); ctx.fill();
            // Alas / Propulsores
            ctx.fillStyle = "#f50";
            ctx.fillRect(-this.width/2 - 5, this.height/2 - 10, 10, 15);
            ctx.fillRect(this.width/2 - 5, this.height/2 - 10, 10, 15);
            
            ctx.restore();
        }
        update() {
            this.tilt = 0;
            if ((keys['a'] || keys['arrowleft']) && this.x > 0) { this.x -= this.speed; this.tilt = -15; }
            if ((keys['d'] || keys['arrowright']) && this.x + this.width < canvas.width) { this.x += this.speed; this.tilt = 15; }
            if ((keys['w'] || keys['arrowup']) && this.y > 0) this.y -= this.speed;
            if ((keys['s'] || keys['arrowdown']) && this.y + this.height < canvas.height) this.y += this.speed;

            if (this.cooldown > 0) this.cooldown--;
            if ((keys[' '] || keys['space']) && this.cooldown === 0) {
                bullets.push(new Bullet(this.x + this.width / 2 - 3, this.y, -12));
                this.cooldown = 12;
            }
        }
    }

    class Bullet {
        constructor(x, y, speedY) { this.x = x; this.y = y; this.width = 6; this.height = 15; this.speedY = speedY; }
        draw() { ctx.fillStyle = "#0f0"; ctx.shadowBlur = 10; ctx.shadowColor = "#0f0"; ctx.fillRect(this.x, this.y, this.width, this.height); ctx.shadowBlur = 0; }
        update() { this.y += this.speedY; }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.width = isBoss ? 200 : 40;
            this.height = isBoss ? 120 : 40;
            this.x = isBoss ? canvas.width/2 - this.width/2 : Math.random() * (canvas.width - this.width);
            this.y = -this.height - 20;
            this.speedX = isBoss ? 3 : (Math.random() - 0.5) * 2;
            this.speedY = isBoss ? 0.5 : 3 + (level * 0.5);
            this.maxHp = isBoss ? 30 + (level * 10) : 1 + Math.floor(level/3);
            this.hp = this.maxHp;
            this.shootTimer = 0;
        }
        draw() {
            ctx.fillStyle = this.isBoss ? "#900" : "#555";
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            // Detalles de la nave enemiga
            ctx.fillStyle = "#f00";
            if(this.isBoss) {
                ctx.fillRect(this.x + 20, this.y + this.height - 10, 40, 20);
                ctx.fillRect(this.x + this.width - 60, this.y + this.height - 10, 40, 20);
                // Barra de vida del jefe
                ctx.fillStyle = "white"; ctx.fillRect(this.x, this.y - 15, this.width, 5);
                ctx.fillStyle = "red"; ctx.fillRect(this.x, this.y - 15, this.width * (this.hp / this.maxHp), 5);
            } else {
                ctx.beginPath(); ctx.moveTo(this.x + this.width/2, this.y + this.height + 10); ctx.lineTo(this.x + this.width, this.y); ctx.lineTo(this.x, this.y); ctx.closePath(); ctx.fill();
            }
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;

            if (this.isBoss) {
                if (this.y > 50) this.speedY = 0; // Se detiene arriba
                if (this.x <= 0 || this.x + this.width >= canvas.width) this.speedX *= -1; // Rebota
                
                // Jefe dispara
                this.shootTimer++;
                if(this.shootTimer > 60 - level) {
                    bullets.push(new Bullet(this.x + 40, this.y + this.height, 8));
                    bullets.push(new Bullet(this.x + this.width - 40, this.y + this.height, 8));
                    this.shootTimer = 0;
                }
            } else {
                // Enemigos rebotan en los bordes
                if (this.x <= 0 || this.x + this.width >= canvas.width) this.speedX *= -1;
            }
        }
    }

    let player;

    function startGame(mode) {
        gameMode = mode;
        score = 0; level = 1; enemiesDefeated = 0; hp = 3; bossActive = false;
        bullets = []; enemies = [];
        player = new Player();
        
        menu.style.display = "none";
        uiLayer.style.display = "flex";
        modeDisplay.innerText = mode === 'story' ? "Historia" : "Loop Infinito";
        
        updateUI();
        gameLoop = requestAnimationFrame(update);
    }

    function updateUI() {
        scoreDisplay.innerText = `Puntos: ${score}`;
        levelDisplay.innerText = `Nivel: ${level}`;
        hpDisplay.innerText = `HP: ${hp}`;
        if(hp <= 0) endGame("¡TE HAN DERRIBADO!");
        if(gameMode === 'story' && level > 10) endGame("¡MISIÓN CUMPLIDA! HAS SALVADO EL SISTEMA LYLAT.");
    }

    function endGame(msg) {
        cancelAnimationFrame(gameLoop);
        menu.style.display = "flex";
        uiLayer.style.display = "none";
        bossWarning.style.display = "none";
        menu.innerHTML = `<h1>${msg}</h1><p>Puntuación Final: ${score}</p>
                          <button onclick="startGame('story')">Reintentar Historia</button>
                          <button onclick="startGame('loop')">Reintentar Loop</button>`;
    }

    function checkCollision(r1, r2) {
        return (r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y);
    }

    function update() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Fondo 3D
        stars.forEach(s => { s.update(); s.draw(); });

        player.update(); player.draw();

        // Balas
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].update(); bullets[i].draw();
            
            // Colisión bala enemiga con jugador
            if (bullets[i].speedY > 0 && checkCollision(bullets[i], player)) {
                hp--; bullets.splice(i, 1); updateUI(); continue;
            }
            if (bullets[i].y < 0 || bullets[i].y > canvas.height) bullets.splice(i, 1);
        }

        // Gestión de Niveles y Jefes
        if (!bossActive && enemiesDefeated >= 15) { // 15 enemigos por nivel
            level++;
            enemiesDefeated = 0;
            updateUI();
            
            if (level % 5 === 0 && (gameMode === 'loop' || level <= 10)) {
                bossWarning.style.display = "block";
                setTimeout(() => { bossWarning.style.display = "none"; enemies.push(new Enemy(true)); bossActive = true; }, 2000);
            }
        }

        // Spawn Enemigos Normales
        if (!bossActive && Math.random() < 0.03 + (level * 0.005)) enemies.push(new Enemy(false));

        // Enemigos
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update(); enemies[i].draw();

            // Colisión con jugador
            if (checkCollision(player, enemies[i])) {
                hp--; enemies[i].hp -= 5; updateUI(); // Chocar hace daño
            }

            // Balas del jugador contra enemigos
            for (let j = bullets.length - 1; j >= 0; j--) {
                if (bullets[j].speedY < 0 && checkCollision(bullets[j], enemies[i])) {
                    enemies[i].hp--; bullets.splice(j, 1);
                    if (enemies[i].hp <= 0) {
                        score += enemies[i].isBoss ? 1000 : 50;
                        if (enemies[i].isBoss) {
                            bossActive = false;
                            enemiesDefeated = 15; // Fuerza a subir al siguiente nivel inmediatamente tras el jefe
                        } else {
                            enemiesDefeated++;
                        }
                        enemies.splice(i, 1); updateUI();
                    }
                    break;
                }
            }
            if (enemies[i] && enemies[i].y > canvas.height) enemies.splice(i, 1);
        }

        if (hp > 0 && (gameMode === 'loop' || level <= 10)) gameLoop = requestAnimationFrame(update);
    }
</script>
</body>
</html>
