<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Space Shooter 2D</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #111;
            color: white;
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }
        canvas {
            background-color: #000;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
            border: 2px solid #333;
        }
        #info {
            margin-bottom: 10px;
            font-size: 20px;
        }
    </style>
</head>
<body>

    <div id="info">Cargando...</div>
    <canvas id="gameCanvas" width="600" height="800"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const infoDiv = document.getElementById("info");

    // Variables globales
    let gameLoop;
    let score = 0;
    let level = 1;
    let enemiesDefeated = 0;
    let gameOver = false;

    // Teclas
    const keys = { ArrowUp: false, ArrowDown: false, ArrowLeft: false, ArrowRight: false, Space: false };

    document.addEventListener("keydown", (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = true;
        if (e.code === "Space") e.preventDefault(); // Evitar scroll
    });
    document.addEventListener("keyup", (e) => {
        if (keys.hasOwnProperty(e.code)) keys[e.code] = false;
    });

    // --- CLASES ---

    class Player {
        constructor() {
            this.width = 40;
            this.height = 40;
            this.x = canvas.width / 2 - this.width / 2;
            this.y = canvas.height - 60;
            this.speed = 6;
            this.color = "#00ffff";
            this.cooldown = 0;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.beginPath();
            ctx.moveTo(this.x + this.width / 2, this.y); // Punta de la nave
            ctx.lineTo(this.x + this.width, this.y + this.height);
            ctx.lineTo(this.x, this.y + this.height);
            ctx.closePath();
            ctx.fill();
        }
        update() {
            if (keys.ArrowLeft && this.x > 0) this.x -= this.speed;
            if (keys.ArrowRight && this.x + this.width < canvas.width) this.x += this.speed;
            if (keys.ArrowUp && this.y > 0) this.y -= this.speed;
            if (keys.ArrowDown && this.y + this.height < canvas.height) this.y += this.speed;

            if (this.cooldown > 0) this.cooldown--;
            
            if (keys.Space && this.cooldown === 0) {
                bullets.push(new Bullet(this.x + this.width / 2 - 2, this.y));
                this.cooldown = 15; // Velocidad de disparo
            }
        }
    }

    class Bullet {
        constructor(x, y) {
            this.x = x;
            this.y = y;
            this.width = 4;
            this.height = 10;
            this.speed = 10;
            this.color = "#ffff00";
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
        }
        update() {
            this.y -= this.speed;
        }
    }

    class Enemy {
        constructor(isBoss = false) {
            this.isBoss = isBoss;
            this.width = isBoss ? 150 : 30 + Math.random() * 20;
            this.height = isBoss ? 100 : 30 + Math.random() * 20;
            this.x = isBoss ? canvas.width / 2 - this.width / 2 : Math.random() * (canvas.width - this.width);
            this.y = isBoss ? 50 : -this.height;
            this.speedX = isBoss ? 3 : 0;
            this.speedY = isBoss ? 0 : 2 + (level * 0.5); // Más rápidos cada nivel
            this.color = isBoss ? "#ff00ff" : "#ff0000";
            this.hp = isBoss ? 50 : 1;
        }
        draw() {
            ctx.fillStyle = this.color;
            ctx.fillRect(this.x, this.y, this.width, this.height);
            
            if (this.isBoss) {
                ctx.fillStyle = "white";
                ctx.fillText(`Jefe HP: ${this.hp}`, this.x + 30, this.y - 10);
            }
        }
        update() {
            this.y += this.speedY;
            this.x += this.speedX;

            // Movimiento del jefe (rebota en los bordes)
            if (this.isBoss) {
                if (this.x <= 0 || this.x + this.width >= canvas.width) {
                    this.speedX *= -1;
                }
            }
        }
    }

    // --- INSTANCIAS Y ARREGLOS ---
    let player = new Player();
    let bullets = [];
    let enemies = [];
    let bossActive = false;

    // --- FUNCIONES DE LÓGICA ---

    function checkCollision(rect1, rect2) {
        return (
            rect1.x < rect2.x + rect2.width &&
            rect1.x + rect1.width > rect2.x &&
            rect1.y < rect2.y + rect2.height &&
            rect1.y + rect1.height > rect2.y
        );
    }

    function spawnEnemies() {
        if (bossActive) return; // No salen enemigos normales si el jefe está

        // Nivel 3 activa al jefe
        if (level === 3 && !bossActive) {
            enemies.push(new Enemy(true));
            bossActive = true;
            return;
        }

        if (Math.random() < 0.02 + (level * 0.005)) {
            enemies.push(new Enemy(false));
        }
    }

    function updateGame() {
        if (gameOver) return;

        // Limpiar pantalla
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Actualizar UI
        infoDiv.innerHTML = `Puntuación: ${score} | Nivel: ${level}`;

        // Jugador
        player.update();
        player.draw();

        // Balas
        for (let i = bullets.length - 1; i >= 0; i--) {
            bullets[i].update();
            bullets[i].draw();
            if (bullets[i].y < 0) bullets.splice(i, 1);
        }

        // Enemigos
        spawnEnemies();
        for (let i = enemies.length - 1; i >= 0; i--) {
            enemies[i].update();
            enemies[i].draw();

            // Colisión con jugador
            if (checkCollision(player, enemies[i])) {
                gameOver = true;
                infoDiv.innerHTML = `¡FIN DEL JUEGO! Puntuación final: ${score}. Recarga la página para jugar de nuevo.`;
            }

            // Colisión balas - enemigos
            for (let j = bullets.length - 1; j >= 0; j--) {
                if (enemies[i] && checkCollision(bullets[j], enemies[i])) {
                    enemies[i].hp--;
                    bullets.splice(j, 1); // Destruir bala

                    if (enemies[i].hp <= 0) {
                        score += enemies[i].isBoss ? 500 : 10;
                        
                        if (enemies[i].isBoss) {
                            bossActive = false;
                            level++; // Subir de nivel tras vencer al jefe
                            enemiesDefeated = 0; // Reiniciar cuenta para el próximo ciclo
                        } else {
                            enemiesDefeated++;
                            // Subir de nivel cada 10 enemigos normales
                            if (enemiesDefeated % 10 === 0 && level < 3) {
                                level++;
                            }
                        }
                        
                        enemies.splice(i, 1); // Destruir enemigo
                    }
                    break;
                }
            }

            // Eliminar enemigos que salen de la pantalla
            if (enemies[i] && enemies[i].y > canvas.height) {
                enemies.splice(i, 1);
            }
        }

        requestAnimationFrame(updateGame);
    }

    // Iniciar juego
    updateGame();
</script>
</body>
</html>
